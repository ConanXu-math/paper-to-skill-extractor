  - "Local h-dependent consistency bounds"
  - "Epsilon-dependent learned-field bounds"
output:
  - "Global TV error rate"
  - "Separated h and epsilon constants"
assumptions:
  - "Initial coupling has zero or controlled TV"
  - "Local bounds are summable over the grid"
  - "Early stopping prevents terminal singularity"
core_steps:
  - "Insert local estimates into the integrated TV inequality."
  - "Evaluate grid integrals of (t - t_k)."
  - "Use Nh <= T to simplify."
  - "Group terms into C_Lip and C_eps."

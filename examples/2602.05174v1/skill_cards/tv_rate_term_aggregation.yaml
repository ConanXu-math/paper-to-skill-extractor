name: "tv_rate_term_aggregation"
zh_name: "TV 误差率逐项拼接"
category: "proof_pattern"
status: "accepted_candidate"
source:
  paper_title: "Total Variation Rates for Riemannian Flow Matching"
  paper_md: "paper.md"
  source_blocks:
    - "The proof of Theorem 1 integrates Lemma 5.1, bounds the score-vector mismatch and divergence mismatch, and uses sum_k int_{t_k}^{t_{k+1}} (t - t_k) dt = h^2/2 to isolate h and epsilon terms."
    - "The resulting bound is TV(pi_T, pi_hat_T) <= h C_Lip + epsilon C_eps, with constants assembled from score, vector-field, divergence, and curvature regularity."
